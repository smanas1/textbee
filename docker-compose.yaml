services:
  # MongoDB servhice
  textbee-db:
    container_name: textbee-db
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-adminUser}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - MONGO_INITDB_DATABASE=textbee
    volumes:
      # - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27018}:27017"
    networks:
      - textbee-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MongoDB Express (optional admin UI)
  mongo-express:
    container_name: textbee-mongo-express
    image: mongo-express:latest
    restart: always
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-adminUser}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - ME_CONFIG_MONGODB_SERVER=textbee-db
    depends_on:
      textbee-db:
        condition: service_healthy
    networks:
      - textbee-network

  # NestJS API
  textbee-api:
    container_name: textbee-api
    # image: ghcr.io/vernu/textbee/api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${PORT:-3004}:3004"
    environment:
      - PORT=${PORT:-3004}
      - MONGO_URI=${MONGO_URI:-mongodb://${MONGO_ROOT_USER:-adminUser}:${MONGO_ROOT_PASS:-adminPassword}@textbee-db:27017/textbee?authSource=admin}
      - MONGO_ROOT_USER=${MONGO_ROOT_USER:-adminUser}
      - MONGO_ROOT_PASS=${MONGO_ROOT_PASS:-adminPassword}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-60d}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3005}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY_ID=${FIREBASE_PRIVATE_KEY_ID}
      - FIREBASE_CLIENT_ID=${FIREBASE_CLIENT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_CLIENT_C509_CERT_URL=${FIREBASE_CLIENT_C509_CERT_URL}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_REPLY_TO=${MAIL_REPLY_TO}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - WEBHOOK_DELIVERY_TIMEOUT_MS=${WEBHOOK_DELIVERY_TIMEOUT_MS:-30000}
      - WEBHOOK_AUTO_DISABLE_FAILURE_THRESHOLD=${WEBHOOK_AUTO_DISABLE_FAILURE_THRESHOLD:-50}
      - WEBHOOK_AUTO_DISABLE_LOOKBACK_DAYS=${WEBHOOK_AUTO_DISABLE_LOOKBACK_DAYS:-30}
      - WEBHOOK_AUTO_DISABLE_MIN_FAILURE_RATE=${WEBHOOK_AUTO_DISABLE_MIN_FAILURE_RATE:-0.50}
      - USE_SMS_QUEUE=${USE_SMS_QUEUE:-false}
      - REDIS_URL=${REDIS_URL:-redis://textbee-redis:6379}
      - CLOUDFLARE_TURNSTILE_SECRET_KEY=${CLOUDFLARE_TURNSTILE_SECRET_KEY}

    depends_on:
      textbee-db:
        condition: service_healthy
      textbee-redis:
        condition: service_healthy
    networks:
      - textbee-network

  # Next.js Web
  textbee-web:
    container_name: textbee-web
    # image: ghcr.io/vernu/textbee/web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${PORT:-3005}:3005"
    environment:
      - PORT=${PORT:-3005}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3005}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3005}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3004/api/v1}
      - NEXT_PUBLIC_LATEST_APP_VERSION_CODE=${NEXT_PUBLIC_LATEST_APP_VERSION_CODE:-17}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_TAWKTO_EMBED_URL=${NEXT_PUBLIC_TAWKTO_EMBED_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL:-mongodb://${MONGO_ROOT_USER:-adminUser}:${MONGO_ROOT_PASS:-adminPassword}@textbee-db:27017/textbee?authSource=admin}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}

    depends_on:
      - textbee-api
    networks:
      - textbee-network

  # Redis (if SMS queue is needed)
  textbee-redis:
    container_name: textbee-redis
    image: redis:alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6378}:6379"
    volumes:
      - redis_data:/data
    networks:
      - textbee-network
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  textbee-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
